version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - '8000:8000'
    volumes:
      - chroma_data:/chroma/chroma

  redis:
    image: redis:latest
    ports:
      - '6379:6379'

  hunter:
    build:
      context: sidecars/hunter_py
      dockerfile: Dockerfile
    ports:
      - '50051:50051'
    environment:
      - PORT=50051
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis
      - ollama

  rag:
    build:
      context: sidecars/rag_py
      dockerfile: Dockerfile
    ports:
      - '50052:50052'
    environment:
      - PORT=50052
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - chromadb
      - ollama

volumes:
  ollama_data:
  chroma_data:
