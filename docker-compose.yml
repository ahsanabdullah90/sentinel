services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - '${OLLAMA_PORT_MAP:-11435:11434}'
    volumes:
      - ollama_data:/root/.ollama

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - '8000:8000'
    volumes:
      - chroma_data:/chroma/chroma

  redis:
    image: redis:latest
    ports:
      - '6379:6379'

  hunter:
    build:
      context: .
      dockerfile: sidecars/hunter/Dockerfile
    ports:
      - '50051:50051'
    environment:
      - PORT=50051
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - ollama

  rag:
    build:
      context: .
      dockerfile: sidecars/rag/Dockerfile
    ports:
      - '50052:50051'
    environment:
      - PORT=50051
      - CHROMA_URL=http://chromadb:8000
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - chromadb
      - ollama

  worker:
    build:
      context: .
      dockerfile: sidecars/worker/Dockerfile
    ports:
      - '50053:50053'
    environment:
      - PORT=50053
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  gap-engine:
    build:
      context: .
      dockerfile: sidecars/gap-engine/Dockerfile
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  ollama_data:
  chroma_data:
