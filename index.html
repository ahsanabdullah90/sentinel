          {

          {

          {

          {

            issuing_org: 'Federal Communications Commission',
            date: '2026-09-12',
            status: 'discovered',
            portal: 'SAM.gov'
          }
        ];

        const mockPortals = [
          {
            id: 'gxcu93yld',
            name: 'Brightspyre',
            base_url: 'https://resume.brightspyre.com/',
            keywords: 'RFP, Media, Consultant, Tender, Documentary, Podcast',
            status: 'Active',
            last_run_at: '2026-05-25 23:31:53 (GMT+5)',
            last_run_duration_ms: 59752,
            opportunities_count: 6,
            rendering_mode: 'Static HTML',
            cloudflare_bypass_score: 'Low Risk',
            selector_config: '{"searchSelector":"input#query-data"}'
          }
        ];

        window.__TAURI_INTERNALS__ = {
          plugins: {},
          invoke: async (cmd, args = {}) => {
            console.log("Mock invoke called:", cmd, args);
            
            if (cmd === 'plugin:sql|load') {
              return 'sentinel-db-handle';
            }
            
            if (cmd === 'plugin:sql|query' || cmd === 'plugin:sql|execute' || cmd === 'plugin:sql|select') {
              const queryStr = args.query || '';
              if (queryStr.includes('opportunities')) {
                return mockOpportunities;
              }
              if (queryStr.includes('portals')) {
                return mockPortals;
              }
              return [];
            }
            
            if (cmd === 'plugin:sql|close') {
              return true;
            }
            
            if (cmd === 'get_ollama_models') {
              return ['phi3', 'llama3', 'mistral', 'qwen2.5'];
            }

            if (cmd === 'check_ollama_status') {
              return 'Online';
            }

            if (cmd === 'bootstrap_system') {
              return 'Success';
            }
            
            return null;
          }
        };

        // Also define metadata/IPC as fallback
        window.__TAURI_IPC__ = (message) => {
          console.log("Mock IPC fallback called:", message);
        };
      }
    </script>

  <body>
